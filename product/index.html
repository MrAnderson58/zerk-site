<!DOCTYPE html>
<html lang="ru" class="product-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/zerk.css">
  <link rel="stylesheet" href="/assets/zerk-assistant.css?v=3">
  <link rel="stylesheet" href="/assets/zerk-cart.css">
</head>
<body class="product-page">
  <div class="bg" aria-hidden="true"><div class="bg-mesh"></div><div class="bg-sweep"></div><div class="bg-grain"></div><div class="bg-vignette"></div></div>
  <div id="zerk-header"></div>
  <main class="product-main" id="productMain">
    <nav class="breadcrumbs product-breadcrumb" id="productBreadcrumbs" aria-label="Хлебные крошки"></nav>
    <article class="product-article glass" id="productArticle" hidden>
      <div class="product-article__media">
        <img id="productImage" src="" alt="Товар ZERK TOOL" width="900" height="700" decoding="async">
      </div>
      <div class="product-article__content">
        <div class="product-article__eyebrow" id="productEyebrow">ZERK TOOL</div>
        <h1 class="product-article__title" id="productTitle">—</h1>
        <p class="product-article__price" id="productPrice" hidden></p>
        <p class="product-article__lead" id="productLead"></p>
        <p class="product-ai-snippet" id="productAiSnippet" data-entity="product"></p>
        <ul class="product-specs" id="productSpecs"></ul>
        <div class="product-details" id="productDetails"></div>
        <div class="product-variants" id="productVariants" hidden>
          <h2 class="product-variants__title">Варианты</h2>
          <div class="product-variants__list" id="productVariantsList"></div>
        </div>
        <div class="product-add-cart-wrap" id="productAddCartWrap" hidden>
          <button type="button" class="zerk-add-btn zerk-add-btn--inline" id="productAddCart" data-add-cart="">В корзину</button>
        </div>
        <div class="product-actions">
          <div class="product-actions__channels">
            <a href="#" class="btn-order" id="productOrderTg" rel="noopener noreferrer" target="_blank">Заказать в Telegram</a>
            <a href="#" class="btn-order btn-order--vk" id="productOrderVk" rel="noopener noreferrer" target="_blank">Заказать в ВКонтакте</a>
            <a href="#" class="btn-order btn-order--wa" id="productOrderWa" rel="noopener noreferrer" target="_blank">Заказать в WhatsApp</a>
          </div>
          <p class="product-actions__hint" id="productOrderHint"></p>
          <a href="/collection" class="btn btn-secondary product-actions__back">Коллекция ZERK TOOL</a>
        </div>
      </div>
    </article>
    <section class="product-related" id="productRelated" hidden aria-label="Похожие товары"></section>
    <section class="product-not-found glass" id="productNotFound" hidden>
      <h1>Товар не найден</h1>
      <p>Выберите модель в <a href="/collection">коллекции ZERK TOOL</a>.</p>
    </section>
    <section class="zerk-faq product-faq" aria-label="Частые вопросы">
      <div id="productFaq"></div>
    </section>
  </main>
  <div id="zerk-footer"></div>
  <script src="/assets/zerk-routes.js" defer></script>
  <script src="/assets/catalog-data.js" defer></script>
  <script src="/assets/zerk-seo.js" defer></script>
  <script src="/assets/zerk.js" defer></script>
  <script src="/assets/zerk-shell.js" defer></script>
  <script src="/assets/zerk-cart.js" defer></script>
  <script src="/assets/product-page.js" defer></script>
  <script src="/assets/zerk-assistant.js?v=3" defer></script>
</body>
</html>
