<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Redirect — ZERK TOOL</title>
  <script>
    (function () {
      var id = new URLSearchParams(location.search).get('id');
      if (id) {
        fetch('/assets/catalog-data.js').then(function () {
          /* fallback */
          location.replace('/collection');
        });
      }
      var scripts = ['/assets/zerk-routes.js', '/assets/catalog-data.js'];
      var i = 0;
      function next() {
        if (i >= scripts.length) {
          var cat = window.ZERK_CATALOG;
          var routes = window.ZERK_ROUTES;
          if (id && cat && routes) {
            location.replace(routes.legacyProductRedirect(id, cat));
          } else {
            location.replace('/collection');
          }
          return;
        }
        var s = document.createElement('script');
        s.src = scripts[i++];
        s.onload = next;
        s.onerror = function () { location.replace('/collection'); };
        document.head.appendChild(s);
      }
      next();
    })();
  </script>
</head>
<body>
  <p><a href="/collection">Коллекция ZERK TOOL</a></p>
</body>
</html>
